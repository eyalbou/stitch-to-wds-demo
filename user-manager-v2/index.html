<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>User Manager v2 -- Stitch + WDS Concepts</title>
<link href="https://fonts.googleapis.com/css2?family=Wix+Madefor+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root {
  --wds-primary: #116DFF;
  --wds-text-primary: #162d3d;
  --wds-text-secondary: #576475;
  --wds-border: #dfe5eb;
  --wds-bg: #f0f4f7;
  --wds-surface: #ffffff;
  --wds-font: "Wix Madefor Display", "Wix Madefor Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--wds-font); background: var(--wds-bg); color: var(--wds-text-primary); }

header {
  background: var(--wds-surface); border-bottom: 1px solid var(--wds-border);
  padding: 16px 32px; display: flex; align-items: center; justify-content: space-between;
}
header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
header .subtitle { font-size: 13px; color: var(--wds-text-secondary); }
.badge-pipeline {
  display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px;
  border-radius: 12px; background: rgba(17,109,255,0.08); color: var(--wds-primary);
  font-size: 12px; font-weight: 600;
}
.badge-stitch {
  display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px;
  border-radius: 12px; background: rgba(96,188,87,0.1); color: #3a8a31;
  font-size: 12px; font-weight: 600;
}

.tabs {
  display: flex; gap: 0; background: var(--wds-surface);
  border-bottom: 1px solid var(--wds-border); padding: 0 32px;
  position: sticky; top: 0; z-index: 100;
}
.tab {
  padding: 12px 20px; font-size: 14px; font-weight: 500;
  color: var(--wds-text-secondary); cursor: pointer;
  border-bottom: 2px solid transparent; transition: all 0.2s;
  white-space: nowrap;
}
.tab:hover { color: var(--wds-text-primary); }
.tab.active { color: var(--wds-primary); border-bottom-color: var(--wds-primary); }
.tab .tag {
  display: inline-flex; padding: 1px 6px; border-radius: 4px;
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.04em; margin-left: 6px; vertical-align: middle;
}
.tab .tag-original { background: rgba(0,0,0,0.06); color: var(--wds-text-secondary); }
.tab .tag-stitch { background: rgba(96,188,87,0.1); color: #3a8a31; }
.tab .tag-wds { background: rgba(17,109,255,0.1); color: var(--wds-primary); }

.tab-content { display: none; }
.tab-content.active { display: block; }

.original-tab {
  display: flex; align-items: center; justify-content: center;
  min-height: calc(100vh - 110px); padding: 32px; background: #1e293b;
}
.original-tab img {
  max-width: 100%; max-height: calc(100vh - 160px);
  border-radius: 8px; box-shadow: 0 4px 24px rgba(0,0,0,0.3);
}

.concept-tab iframe {
  width: 100%; height: calc(100vh - 110px); border: none;
}
</style>
</head>
<body>

<header>
  <div>
    <h1>User Manager v2 -- Full Pipeline Test</h1>
    <div class="subtitle">Generated via Stitch MCP &rarr; WDS Conversion Pipeline &rarr; CK Phase 4 Output</div>
  </div>
  <div style="display:flex;gap:8px">
    <div class="badge-stitch">Stitch Generated</div>
    <div class="badge-pipeline">WDS Converted</div>
  </div>
</header>

<div class="tabs" id="tabs">
  <div class="tab active" data-tab="0">Original Input <span class="tag tag-original">Input</span></div>
  <div class="tab" data-tab="1">Dashboard <span class="tag tag-stitch">Stitch</span><span class="tag tag-wds">WDS</span></div>
  <div class="tab" data-tab="2">Timeline Feed <span class="tag tag-stitch">Stitch</span><span class="tag tag-wds">WDS</span></div>
  <div class="tab" data-tab="3">Command Palette <span class="tag tag-stitch">Stitch</span><span class="tag tag-wds">WDS</span></div>
</div>

<div class="tab-content active" id="tab-0">
  <div class="original-tab">
    <img src="original-input.png" alt="Original User Manager screenshot" />
  </div>
</div>

<div class="tab-content" id="tab-1">
  <div class="concept-tab">
    <iframe src="concept-1-dashboard-adjusted.html"></iframe>
  </div>
</div>

<div class="tab-content" id="tab-2">
  <div class="concept-tab">
    <iframe src="concept-2-timeline-adjusted.html"></iframe>
  </div>
</div>

<div class="tab-content" id="tab-3">
  <div class="concept-tab">
    <iframe src="concept-3-command-palette-adjusted.html"></iframe>
  </div>
</div>

<script>
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
  });
});
</script>

</body>
</html>
