<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search Results — User Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Wix+Madefor+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
  <style>
    :root {
      --primary: #116dff;
      --primary-hover: #0e5cd7;
      --text: #162d3d;
      --text-secondary: #576475;
      --bg: #f0f4f7;
      --surface: #ffffff;
      --border: #dfe5eb;
      --success: #60bc57;
      --warning: #fdb10c;
      --error: #ee5951;
      --topbar: #162d3d;
      --shadow-card: 0 1px 6px rgba(0, 0, 0, 0.06);
      --radius-card: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Wix Madefor Display", "Helvetica Neue", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.45;
      min-height: 100vh;
    }

    .material-symbols-outlined {
      font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
      font-size: 20px;
      line-height: 1;
      vertical-align: middle;
    }

    .topbar {
      height: 48px;
      background: var(--topbar);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .topbar-brand {
      font-weight: 700;
      font-size: 14px;
      letter-spacing: -0.02em;
    }

    .btn-secondary-top {
      height: 36px;
      padding: 0 18px;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.45);
      background: transparent;
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease;
    }

    .btn-secondary-top:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: #fff;
    }

    .page-inner {
      max-width: 1440px;
      margin: 0 auto;
      padding: 24px 48px 48px;
    }

    .search-strip {
      margin-bottom: 24px;
    }

    .search-field {
      display: flex;
      align-items: center;
      gap: 12px;
      max-width: 720px;
      height: 48px;
      padding: 0 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow-card);
    }

    .search-field input {
      flex: 1;
      border: none;
      background: transparent;
      font-family: inherit;
      font-size: 14px;
      color: var(--text);
      outline: none;
    }

    .search-field .material-symbols-outlined {
      color: var(--text-secondary);
    }

    .main-grid {
      display: grid;
      grid-template-columns: 240px 1fr 300px;
      gap: 24px;
      align-items: start;
    }

    @media (max-width: 1100px) {
      .main-grid {
        grid-template-columns: 1fr;
      }
      .page-inner {
        padding: 24px;
      }
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
      padding: 24px;
    }

    .section-title {
      font-size: 16px;
      font-weight: 600;
      margin: 0 0 18px;
      color: var(--text);
    }

    .filter-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .filter-group + .filter-group {
      margin-top: 18px;
    }

    .filter-select {
      width: 100%;
      height: 36px;
      padding: 0 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-family: inherit;
      font-size: 14px;
      color: var(--text);
      background: var(--surface);
    }

    .results-header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .results-count {
      font-weight: 600;
      font-size: 16px;
      margin: 0;
    }

    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .pill {
      height: 30px;
      padding: 0 14px;
      border-radius: 15px;
      border: 1px solid var(--primary);
      background: transparent;
      color: var(--primary);
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .pill:hover {
      background: rgba(17, 109, 255, 0.08);
    }

    .pill.active {
      background: var(--primary);
      color: #fff;
    }

    .result-card {
      display: flex;
      align-items: flex-start;
      gap: 18px;
      padding: 18px;
      margin-bottom: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
      cursor: pointer;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .result-card:hover {
      border-color: var(--primary);
    }

    .result-card.selected {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(17, 109, 255, 0.2), var(--shadow-card);
    }

    .result-card[hidden] {
      display: none;
    }

    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, #116dff 0%, #3b6ef0 100%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 16px;
      flex-shrink: 0;
    }

    .result-body {
      flex: 1;
      min-width: 0;
    }

    .result-name {
      font-weight: 600;
      font-size: 16px;
      margin: 0 0 6px;
    }

    .result-meta {
      font-size: 14px;
      color: var(--text-secondary);
      margin: 0 0 12px;
    }

    .result-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      height: 24px;
      padding: 0 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
    }

    .badge-success {
      background: rgba(96, 188, 87, 0.15);
      color: var(--success);
    }

    .badge-warning {
      background: rgba(253, 177, 12, 0.18);
      color: #b87a00;
    }

    .badge-muted {
      background: var(--bg);
      color: var(--text-secondary);
    }

    .preview-placeholder {
      color: var(--text-secondary);
      font-size: 14px;
      text-align: center;
      padding: 24px 12px;
    }

    .preview-avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      margin: 0 auto 18px;
      background: linear-gradient(135deg, #116dff 0%, #3b6ef0 100%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 24px;
    }

    .preview-name {
      font-size: 18px;
      font-weight: 700;
      margin: 0 0 6px;
      text-align: center;
    }

    .preview-email {
      font-size: 14px;
      color: var(--text-secondary);
      margin: 0 0 24px;
      text-align: center;
      word-break: break-all;
    }

    .dl-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }

    .dl-row:last-child {
      border-bottom: none;
    }

    .dl-dt {
      color: var(--text-secondary);
    }

    .dl-dd {
      font-weight: 600;
      text-align: right;
    }

    .btn-primary {
      height: 36px;
      padding: 0 18px;
      border-radius: 18px;
      border: none;
      background: var(--primary);
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
    }

    .preview-actions {
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn-secondary {
      height: 36px;
      padding: 0 18px;
      border-radius: 18px;
      border: 1px solid var(--primary);
      background: transparent;
      color: var(--primary);
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .btn-secondary:hover {
      background: rgba(17, 109, 255, 0.08);
    }

    button:focus-visible,
    input:focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <header class="topbar">
    <span class="topbar-brand">USER MANAGER</span>
    <button type="button" class="btn-secondary-top">Give Feedback</button>
  </header>

  <div class="page-inner">
    <div class="search-strip">
      <div class="search-field">
        <span class="material-symbols-outlined" aria-hidden="true">search</span>
        <input type="search" id="searchInput" value="john@example.com" aria-label="Search users" />
      </div>
    </div>

    <div class="main-grid">
      <aside class="card">
        <h2 class="section-title">Refine</h2>
        <div class="filter-group">
          <label for="region">Region</label>
          <select id="region" class="filter-select">
            <option>All regions</option>
            <option>Americas</option>
            <option>EMEA</option>
            <option>APAC</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="plan">Plan</label>
          <select id="plan" class="filter-select">
            <option>Any plan</option>
            <option>Free</option>
            <option>Premium</option>
            <option>Studio</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="sort">Sort</label>
          <select id="sort" class="filter-select">
            <option>Relevance</option>
            <option>Last active</option>
            <option>Created date</option>
          </select>
        </div>
      </aside>

      <section>
        <div class="results-header">
          <p class="results-count" id="resultsCount">3 results</p>
          <div class="pills" role="group" aria-label="Quick filters">
            <button type="button" class="pill active" data-filter="all">All</button>
            <button type="button" class="pill" data-filter="active">Active</button>
            <button type="button" class="pill" data-filter="suspended">Suspended</button>
            <button type="button" class="pill" data-filter="premium">Premium</button>
          </div>
        </div>
        <div id="resultsList" role="list"></div>
      </section>

      <aside class="card" id="previewPanel">
        <h2 class="section-title">Preview</h2>
        <div id="previewContent">
          <p class="preview-placeholder">Hover or select a user to see details.</p>
        </div>
      </aside>
    </div>
  </div>

  <script>
    (function () {
      var users = [
        {
          id: "usr_8k2m9p",
          name: "John Doe",
          email: "john@example.com",
          status: "active",
          plan: "Premium",
          sites: 12,
          initials: "JD",
          lastActive: "2 hours ago",
          created: "Jan 12, 2023"
        },
        {
          id: "usr_4n7qx1",
          name: "Johnny Rivers",
          email: "johnny.r@example.com",
          status: "active",
          plan: "Free",
          sites: 1,
          initials: "JR",
          lastActive: "Yesterday",
          created: "Aug 3, 2024"
        },
        {
          id: "usr_2b5h8w",
          name: "Johanna Smith",
          email: "j.smith@example.com",
          status: "suspended",
          plan: "Studio",
          sites: 28,
          initials: "JS",
          lastActive: "14 days ago",
          created: "Mar 1, 2021"
        }
      ];

      var listEl = document.getElementById("resultsList");
      var previewEl = document.getElementById("previewContent");
      var countEl = document.getElementById("resultsCount");
      var pills = document.querySelectorAll(".pill");
      var currentFilter = "all";
      var hoverUser = null;
      var selectedId = null;

      function userById(id) {
        for (var i = 0; i < users.length; i++) {
          if (users[i].id === id) {
            return users[i];
          }
        }
        return null;
      }

      function statusBadge(status) {
        if (status === "active") {
          return '<span class="badge badge-success">Active</span>';
        }
        if (status === "suspended") {
          return '<span class="badge badge-warning">Suspended</span>';
        }
        return '<span class="badge badge-muted">' + status + "</span>";
      }

      function planClass(plan) {
        return plan === "Free" ? "badge-muted" : "badge-muted";
      }

      function renderList() {
        listEl.innerHTML = "";
        var visible = 0;
        users.forEach(function (u) {
          var show =
            currentFilter === "all" ||
            (currentFilter === "active" && u.status === "active") ||
            (currentFilter === "suspended" && u.status === "suspended") ||
            (currentFilter === "premium" && (u.plan === "Premium" || u.plan === "Studio"));
          var card = document.createElement("div");
          card.className = "result-card" + (selectedId === u.id ? " selected" : "");
          card.setAttribute("role", "listitem");
          card.dataset.id = u.id;
          card.hidden = !show;
          if (show) visible++;
          card.innerHTML =
            '<div class="avatar" aria-hidden="true">' +
            u.initials +
            "</div>" +
            '<div class="result-body">' +
            '<p class="result-name">' +
            u.name +
            "</p>" +
            '<p class="result-meta">' +
            u.email +
            "</p>" +
            '<div class="result-row">' +
            "<span class=\"badge " +
            planClass(u.plan) +
            '">ID ' +
            u.id +
            "</span>" +
            statusBadge(u.status) +
            '<span class="badge badge-muted">' +
            u.plan +
            "</span>" +
            '<span class="badge badge-muted">' +
            u.sites +
            " sites</span>" +
            "</div>" +
            "</div>";
          card.addEventListener("mouseenter", function () {
            hoverUser = u;
            if (!selectedId) renderPreview(u);
          });
          card.addEventListener("mouseleave", function () {
            hoverUser = null;
            if (selectedId) {
              var sel = userById(selectedId);
              if (sel) renderPreview(sel);
            } else {
              renderPreview(null);
            }
          });
          card.addEventListener("click", function () {
            selectedId = u.id;
            document.querySelectorAll(".result-card").forEach(function (c) {
              c.classList.toggle("selected", c.dataset.id === selectedId);
            });
            renderPreview(u);
          });
          listEl.appendChild(card);
        });
        countEl.textContent = visible + " result" + (visible === 1 ? "" : "s");
      }

      function renderPreview(u) {
        if (!u) {
          previewEl.innerHTML =
            '<p class="preview-placeholder">Hover or select a user to see details.</p>';
          return;
        }
        previewEl.innerHTML =
          '<div class="preview-avatar" aria-hidden="true">' +
          u.initials +
          "</div>" +
          '<p class="preview-name">' +
          u.name +
          "</p>" +
          '<p class="preview-email">' +
          u.email +
          "</p>" +
          '<div class="dl-row"><span class="dl-dt">User ID</span><span class="dl-dd">' +
          u.id +
          "</span></div>" +
          '<div class="dl-row"><span class="dl-dt">Status</span><span class="dl-dd">' +
          u.status +
          "</span></div>" +
          '<div class="dl-row"><span class="dl-dt">Plan</span><span class="dl-dd">' +
          u.plan +
          "</span></div>" +
          '<div class="dl-row"><span class="dl-dt">Sites</span><span class="dl-dd">' +
          u.sites +
          "</span></div>" +
          '<div class="dl-row"><span class="dl-dt">Last active</span><span class="dl-dd">' +
          u.lastActive +
          "</span></div>" +
          '<div class="dl-row"><span class="dl-dt">Created</span><span class="dl-dd">' +
          u.created +
          "</span></div>" +
          '<div class="preview-actions">' +
          '<button type="button" class="btn-primary">Open account</button>' +
          '<button type="button" class="btn-secondary">Copy email</button>' +
          "</div>";
      }

      pills.forEach(function (pill) {
        pill.addEventListener("click", function () {
          pills.forEach(function (p) {
            p.classList.remove("active");
          });
          pill.classList.add("active");
          currentFilter = pill.getAttribute("data-filter");
          renderList();
        });
      });

      renderList();
    })();
  </script>
</body>
</html>
