<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>User Manager — Empty State</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Wix+Madefor+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
  <style>
    :root {
      --wds-primary: #116dff;
      --wds-primary-hover: #0e5cd7;
      --wds-text: #162d3d;
      --wds-secondary: #576475;
      --wds-bg: #f0f4f7;
      --wds-surface: #ffffff;
      --wds-border: #dfe5eb;
      --wds-topbar: #162d3d;
      --card-shadow: 0 1px 6px rgba(0, 0, 0, 0.06);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      font-family: "Wix Madefor Display", system-ui, sans-serif;
      background: var(--wds-bg);
      color: var(--wds-text);
      letter-spacing: -0.02em;
      line-height: 1.45;
    }
    .material-symbols-outlined {
      font-variation-settings: "FILL" 0, "wght" 300, "GRAD" 0, "opsz" 48;
      line-height: 1;
    }
    .topbar {
      height: 48px;
      background: var(--wds-topbar);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }
    .topbar__left { display: flex; align-items: center; gap: 12px; }
    .topbar-home {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
      cursor: pointer;
      transition: background 0.2s ease;
    }
    .topbar-home:hover { background: rgba(255, 255, 255, 0.2); }
    .topbar-home .material-symbols-outlined { font-size: 22px; font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24; }
    .topbar__brand {
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.06em;
    }
    .topbar__link {
      height: 36px;
      padding: 0 16px;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.35);
      background: transparent;
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease;
    }
    .topbar__link:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.5);
    }
    .main {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px 24px 48px;
    }
    .search-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: stretch;
      margin-bottom: 24px;
      padding: 24px;
      background: var(--wds-surface);
      border: 1px solid var(--wds-border);
      border-radius: 8px;
      box-shadow: var(--card-shadow);
    }
    .search-row input[type="text"] {
      flex: 1 1 200px;
      min-height: 36px;
      padding: 0 12px;
      border: 1px solid var(--wds-border);
      border-radius: 8px;
      background: var(--wds-surface);
      color: var(--wds-text);
      font-size: 14px;
      font-family: inherit;
    }
    .search-row input[type="text"]:focus {
      outline: none;
      border-color: var(--wds-primary);
      box-shadow: 0 0 0 2px rgba(17, 109, 255, 0.2);
    }
    .search-row select {
      min-height: 36px;
      padding: 0 12px;
      border: 1px solid var(--wds-border);
      border-radius: 8px;
      background: var(--wds-surface);
      color: var(--wds-text);
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
    }
    .btn {
      min-height: 36px;
      padding: 0 20px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      border-radius: 18px;
      transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
    }
    .btn:focus-visible {
      outline: 2px solid var(--wds-primary);
      outline-offset: 2px;
    }
    .btn--primary {
      border: none;
      background: var(--wds-primary);
      color: #fff;
    }
    .btn--primary:hover { background: var(--wds-primary-hover); }
    .btn--outline {
      border: 1px solid var(--wds-primary);
      background: transparent;
      color: var(--wds-primary);
    }
    .btn--outline:hover {
      background: rgba(17, 109, 255, 0.06);
    }
    .results-line {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 32px;
      color: var(--wds-text);
    }
    .empty {
      text-align: center;
      padding: 32px 16px 40px;
    }
    .empty__icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      color: var(--wds-border);
    }
    .empty__icon .material-symbols-outlined {
      font-size: 64px;
      font-variation-settings: "FILL" 0, "wght" 300, "GRAD" 0, "opsz" 48;
    }
    .empty__title {
      font-size: 24px;
      font-weight: 700;
      margin: 0 0 12px;
      letter-spacing: -0.03em;
      line-height: 1.2;
    }
    .empty__sub {
      font-size: 14px;
      color: var(--wds-secondary);
      margin: 0 0 28px;
      max-width: 360px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.5;
    }
    .empty__actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }
    .tips-wrap {
      max-width: 480px;
      margin: 0 auto;
    }
    .tips {
      border: 1px solid var(--wds-border);
      border-radius: 8px;
      background: var(--wds-surface);
      box-shadow: var(--card-shadow);
      padding: 0;
      margin-top: 40px;
      overflow: hidden;
    }
    .tips__title {
      font-size: 14px;
      font-weight: 700;
      padding: 16px 20px;
      border-bottom: 1px solid var(--wds-border);
      margin: 0;
      background: var(--wds-bg);
    }
    .tips__list {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .tips__item {
      font-size: 14px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--wds-border);
      cursor: default;
      transition: background 0.15s ease;
      color: var(--wds-text);
    }
    .tips__item:last-child {
      border-bottom: none;
    }
    .tips__item--on {
      background: rgba(17, 109, 255, 0.06);
      color: var(--wds-primary);
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar__left">
      <button type="button" class="topbar-home" aria-label="Home" data-hook="topbar-home">
        <span class="material-symbols-outlined" aria-hidden="true">home</span>
      </button>
      <span class="topbar__brand">USER MANAGER</span>
    </div>
    <button type="button" class="topbar__link" id="feedbackBtn" data-hook="give-feedback">Give Feedback</button>
  </header>

  <main class="main">
    <div class="search-row">
      <input type="text" id="searchInput" value="xyz123@notfound.com" autocomplete="off" aria-label="Search" />
      <select id="searchType" aria-label="Search type">
        <option value="email" selected>By email</option>
        <option value="id">By account ID</option>
        <option value="name">By name</option>
      </select>
      <button type="button" class="btn btn--primary" id="searchBtn" data-hook="search">Search</button>
    </div>

    <p class="results-line" id="resultsLine">0 results for 'xyz123@notfound.com'</p>

    <section class="empty" aria-live="polite">
      <div class="empty__icon" aria-hidden="true">
        <span class="material-symbols-outlined">search</span>
      </div>
      <h1 class="empty__title">No users found</h1>
      <p class="empty__sub">Try adjusting your search term or switching the search type.</p>
      <div class="empty__actions">
        <button type="button" class="btn btn--outline" id="clearBtn" data-hook="clear-search">Clear Search</button>
        <button type="button" class="btn btn--primary" id="homeBtn" data-hook="back-home">Back to Home</button>
      </div>
    </section>

    <div class="tips-wrap">
      <aside class="tips">
        <h2 class="tips__title">Search Tips</h2>
        <ul class="tips__list">
          <li class="tips__item">Search by email for exact matches</li>
          <li class="tips__item">Use account ID (ACC-XXXXX) for direct lookup</li>
          <li class="tips__item">Try partial name with at least 3 characters</li>
        </ul>
      </aside>
    </div>
  </main>

  <script>
    (function () {
      var input = document.getElementById("searchInput");
      var resultsLine = document.getElementById("resultsLine");
      var searchBtn = document.getElementById("searchBtn");
      var clearBtn = document.getElementById("clearBtn");
      var homeBtn = document.getElementById("homeBtn");

      function runSearch() {
        var q = input.value.trim();
        resultsLine.textContent =
          q.length === 0
            ? "0 results for ''"
            : "0 results for '" + q + "'";
      }

      searchBtn.addEventListener("click", runSearch);
      input.addEventListener("keydown", function (e) {
        if (e.key === "Enter") {
          e.preventDefault();
          runSearch();
        }
      });

      clearBtn.addEventListener("click", function () {
        input.value = "";
        input.focus();
        runSearch();
      });

      homeBtn.addEventListener("click", function () {
        window.location.href = "search-results.html";
      });

      document.querySelectorAll(".tips__item").forEach(function (el) {
        el.addEventListener("mouseenter", function () {
          el.classList.add("tips__item--on");
        });
        el.addEventListener("mouseleave", function () {
          el.classList.remove("tips__item--on");
        });
      });
    })();
  </script>
</body>
</html>
